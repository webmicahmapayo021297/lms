<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lesson — MyLMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <style>
    :root{--green:#04AA6D;--green-dark:#028a57;--green-light:#e8f8f1;--primary:#4f46e5;--primary-light:#ede9fe;--orange:#f97316;--orange-dark:#ea580c;--orange-light:#fff7ed;--purple:#7c3aed;--purple-light:#f5f3ff;--yellow-bg:#fffde7;--yellow-border:#f9a825;--blue-bg:#e3f2fd;--blue-border:#1976d2;--red-bg:#fdecea;--red-border:#e53935;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--bg:#f8fafc;--card:#ffffff;--sidebar-w:260px;--header-h:56px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .topbar{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:#1a1a2e;display:flex;align-items:center;padding:0 1.25rem;gap:1rem;z-index:100;border-bottom:2px solid var(--green);}
    .topbar-logo{font-size:1.1rem;font-weight:700;color:#fff;text-decoration:none;}
    .progress-track{flex:1;max-width:280px;height:6px;background:rgba(255,255,255,0.15);border-radius:99px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width 0.4s ease;}
    .progress-label{font-size:0.78rem;color:rgba(255,255,255,0.7);white-space:nowrap;}
    .topbar-right{display:flex;align-items:center;gap:0.75rem;margin-left:auto;}
    .topbar-user{font-size:0.8rem;color:rgba(255,255,255,0.6);}
    .btn-back-top{padding:0.35rem 0.8rem;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font:inherit;font-size:0.78rem;cursor:pointer;text-decoration:none;transition:background 0.15s;}
    .btn-back-top:hover{background:rgba(255,255,255,0.18);}
    .layout{display:flex;margin-top:var(--header-h);min-height:calc(100vh - var(--header-h));}
    .sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);position:fixed;top:var(--header-h);bottom:0;overflow-y:auto;z-index:50;}
    .sidebar-header{padding:1rem 1.25rem 0.75rem;border-bottom:1px solid var(--border);}
    .sidebar-course-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
    .sidebar-module{padding:0.6rem 1.25rem 0.25rem;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);}
    .sidebar-lesson{display:flex;align-items:center;gap:0.65rem;padding:0.6rem 1.25rem;font-size:0.84rem;color:var(--text);cursor:pointer;text-decoration:none;transition:background 0.1s;border-left:3px solid transparent;}
    .sidebar-lesson:hover{background:var(--bg);}
    .sidebar-lesson.active{background:var(--green-light);border-left-color:var(--green);color:var(--green-dark);font-weight:600;}
    .sidebar-lesson.locked{color:#b0bec5;cursor:not-allowed;}
    .lesson-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;flex-shrink:0;border:1.5px solid var(--border);background:var(--bg);}
    .lesson-icon.done{background:var(--green);border-color:var(--green);color:#fff;}
    .lesson-icon.active-icon{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
    .lesson-icon.locked{background:#f1f5f9;color:#b0bec5;border-color:#dde3ea;}
    .main{margin-left:var(--sidebar-w);flex:1;max-width:860px;padding:2rem 2.5rem 4rem;}
    .lesson-meta{font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem;}
    .lesson-title{font-size:2rem;font-weight:700;margin-bottom:1.5rem;line-height:1.2;}

    /* ── Theory content: rich HTML from Quill ── */
    .theory-content{font-size:0.95rem;line-height:1.7;margin-bottom:1.5rem;color:var(--text);display:block;}
    .theory-content p{margin-bottom:0.65rem;display:block;}
    .theory-content p:last-child{margin-bottom:0;}
    .theory-content p:empty{display:none;}
    .theory-content ul{padding-left:1.5rem;margin-bottom:0.75rem;}
    .theory-content ul li{list-style:disc;margin-bottom:0.3rem;}
    .theory-content ol{padding-left:1.5rem;margin-bottom:0.75rem;}
    .theory-content ol li{list-style:decimal;margin-bottom:0.3rem;}
    .theory-content strong{font-weight:700;}
    .theory-content em{font-style:italic;}
    .theory-content u{text-decoration:underline;}
    .theory-content h2{font-size:1.2rem;font-weight:700;margin:1rem 0 0.5rem;}
    .theory-content h3{font-size:1rem;font-weight:700;margin:0.75rem 0 0.4rem;}

    .note-box{border-radius:8px;padding:0.9rem 1.1rem;margin:1.25rem 0;font-size:0.88rem;line-height:1.6;border-left:4px solid;}
    .note-box.tip{background:var(--yellow-bg);border-color:var(--yellow-border);}
    .note-box.info{background:var(--blue-bg);border-color:var(--blue-border);}
    .note-box.warning{background:var(--red-bg);border-color:var(--red-border);}
    .note-box strong{display:block;margin-bottom:0.25rem;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.04em;}
    .note-box.tip strong{color:#b45309;}.note-box.info strong{color:#1565c0;}.note-box.warning strong{color:#c62828;}
    .section-heading{font-size:1.25rem;font-weight:700;margin:2rem 0 0.75rem;padding-bottom:0.4rem;border-bottom:2px solid var(--border);}
    .code-block-wrap{margin:1.25rem 0;}
    .code-block-label{font-size:0.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;}
    .code-block-wrap pre{border-radius:10px;overflow-x:auto;font-size:0.875rem;line-height:1.6;}
    .code-block-wrap pre code{font-family:'JetBrains Mono',monospace;}
    .btn-try{display:inline-flex;align-items:center;gap:0.4rem;padding:0.5rem 1.2rem;background:var(--green);color:#fff;border:none;border-radius:6px;font:inherit;font-size:0.875rem;font-weight:600;cursor:pointer;transition:background 0.15s;margin-top:0.5rem;}
    .btn-try:hover{background:var(--green-dark);}
    .block-progress{display:flex;align-items:center;gap:0.6rem;margin-bottom:1.5rem;padding:0.75rem 1rem;background:var(--card);border-radius:10px;border:1px solid var(--border);}
    .bp-label{font-size:0.8rem;color:var(--muted);font-weight:500;}
    .bp-dots{display:flex;gap:0.4rem;}
    .bp-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background 0.3s;}
    .bp-dot.passed{background:var(--green);}
    .bp-dot.challenge{background:var(--orange-light);border:2px solid var(--orange);}
    .bp-dot.challenge.passed{background:var(--orange);}
    .bp-dot.assignment{background:var(--purple-light);border:2px solid var(--purple);}
    .bp-dot.assignment.passed{background:var(--purple);}
    .exercise-card{background:var(--card);border-radius:12px;border:2px solid #fce7f3;padding:1.5rem;margin:2rem 0;transition:border-color 0.3s;}
    .exercise-card.passed{border-color:var(--green);}
    .exercise-number{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#9d174d;margin-bottom:0.5rem;}
    .exercise-card.passed .exercise-number{color:var(--green);}
    .exercise-question{font-size:1rem;font-weight:600;margin-bottom:1.1rem;line-height:1.5;}
    .option-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;}
    .option-btn{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1rem;border:1.5px solid var(--border);border-radius:8px;background:#fff;font:inherit;font-size:0.88rem;cursor:pointer;text-align:left;transition:border-color 0.15s,background 0.15s;}
    .option-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-light);}
    .option-btn.selected{border-color:var(--primary);background:var(--primary-light);}
    .option-btn.correct{border-color:var(--green);background:var(--green-light);}
    .option-btn.incorrect{border-color:#ef4444;background:#fef2f2;}
    .option-btn:disabled{cursor:not-allowed;}
    .option-letter{width:28px;height:28px;border-radius:50%;background:#f1f5f9;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;}
    .exercise-actions{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;}
    .btn-check{padding:0.55rem 1.4rem;background:var(--green);color:#fff;border:none;border-radius:7px;font:inherit;font-size:0.875rem;font-weight:600;cursor:pointer;transition:background 0.15s;}
    .btn-check:hover:not(:disabled){background:var(--green-dark);}
    .btn-check:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-hint{padding:0.5rem 1rem;background:transparent;color:#92400e;border:1.5px solid #f59e0b;border-radius:7px;font:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;transition:background 0.15s;}
    .btn-hint:hover{background:var(--yellow-bg);}
    .exercise-feedback{margin-top:0.9rem;padding:0.7rem 1rem;border-radius:8px;font-size:0.875rem;font-weight:500;display:none;}
    .exercise-feedback.show{display:block;}
    .exercise-feedback.success{background:var(--green-light);color:#065f46;border:1px solid #a7f3d0;}
    .exercise-feedback.error{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;}
    .hint-box{display:none;margin-top:0.75rem;padding:0.75rem 1rem;background:var(--yellow-bg);border:1px solid #f59e0b;border-radius:8px;font-size:0.875rem;color:#78350f;line-height:1.6;}
    .hint-box.show{display:block;}
    /* ── W3Schools-style Challenge Card ── */
    .challenge-card{background:var(--card);border-radius:12px;border:2px solid #e2e8f0;padding:0;margin:2rem 0;overflow:hidden;transition:border-color 0.3s;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
    .challenge-card.passed{border-color:var(--green);}
    .ch-top{padding:1.25rem 1.5rem 1rem;}
    .ch-badge-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;}
    .ch-badge{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--orange);display:flex;align-items:center;gap:0.3rem;}
    .ch-badge.passed-badge{color:var(--green-dark);}
    .ch-main-title{font-size:1.15rem;font-weight:700;color:var(--text);margin-bottom:0.25rem;}
    .ch-subtitle{font-size:0.9rem;color:var(--muted);margin-bottom:1rem;line-height:1.5;}
    .ch-instr-box{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:1rem 1.25rem;margin-bottom:1rem;}
    .ch-instr-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:0.65rem;}
    /* Split editor area */
    .ch-split-wrap{display:flex;border-top:1px solid var(--border);min-height:260px;}
    .ch-editor-side{flex:1;display:flex;flex-direction:column;border-right:1px solid #333;min-width:0;}
    .ch-editor-tabs{background:#1a1a2e;display:flex;align-items:center;padding:0 1rem;gap:0;border-bottom:1px solid #333;}
    .ch-tab{padding:0.6rem 1rem;font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.45);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
    .ch-tab.active{color:#fff;border-bottom-color:var(--green);}
    .ch-check-btn{margin-left:auto;padding:0.4rem 1.1rem;background:var(--green);color:#fff;border:none;border-radius:6px;font:inherit;font-size:0.82rem;font-weight:700;cursor:pointer;transition:background 0.15s;}
    .ch-check-btn:hover:not(:disabled){background:var(--green-dark);}
    .ch-check-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .ch-check-btn.passed-btn{background:#0f766e;}
    .ch-code-area{flex:1;overflow:hidden;position:relative;}
    .ch-solution-area{flex:1;overflow:hidden;display:none;background:#1e1e2e;padding:1rem;font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:#a5b4fc;line-height:1.6;overflow-y:auto;}
    .ch-result-side{flex:1;display:flex;flex-direction:column;min-width:0;}
    .ch-result-header{background:#1a1a2e;padding:0.5rem 1rem;display:flex;align-items:center;gap:0.5rem;border-bottom:1px solid #333;}
    .ch-mac-dots{display:flex;gap:5px;}
    .ch-dot{width:12px;height:12px;border-radius:50%;}
    .ch-dot.red{background:#ff5f57;}.ch-dot.yellow{background:#febc2e;}.ch-dot.green{background:#28c840;}
    .ch-result-label{font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.7);margin-left:0.25rem;}
    .ch-result-frame{flex:1;background:#fff;border:none;width:100%;min-height:220px;}
    .ch-result-placeholder{flex:1;background:#fff;padding:1.25rem;font-family:'JetBrains Mono',monospace;font-size:0.82rem;color:#10b981;line-height:1.6;}
    /* Feedback bar */
    .ch-feedback-bar{padding:0.85rem 1.5rem;font-size:0.875rem;font-weight:500;display:none;border-top:1px solid var(--border);}
    .ch-feedback-bar.show{display:block;}
    .ch-feedback-bar.success{background:#f0fdf4;color:#065f46;}
    .ch-feedback-bar.error{background:#fef2f2;color:#991b1b;}
    .ch-feedback-bar.warning{background:#fffbeb;color:#92400e;}
    /* Checklist */
    .ch-checklist{padding:1rem 1.5rem;border-top:1px solid var(--border);}
    .ch-checklist-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:0.75rem;}
    .ch-check-item{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.85rem;border-radius:8px;border:1px solid var(--border);background:#fafbfc;margin-bottom:0.4rem;font-size:0.875rem;color:var(--text);transition:all 0.2s;}
    .ch-check-item.checked{background:#f0fdf4;border-color:#a7f3d0;color:#065f46;}
    .ch-check-box{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;transition:all 0.2s;}
    .ch-check-item.checked .ch-check-box{background:var(--green);border-color:var(--green);color:#fff;}
    .ch-hint-bar{display:none;padding:0.75rem 1.5rem;background:var(--yellow-bg);border-top:1px solid #f59e0b;font-size:0.875rem;color:#78350f;line-height:1.6;}
    .ch-hint-bar.show{display:block;}
    .CodeMirror{font-family:'JetBrains Mono',monospace!important;font-size:0.85rem!important;line-height:1.6!important;}
    /* Line highlight for matched code */
    .ch-line-pass{background:rgba(4,170,109,0.18)!important;}
    /* Challenge instructions rich text */
    .ch-instr-content{font-size:0.92rem;line-height:1.7;color:var(--text);margin-bottom:0.75rem;}
    .ch-instr-content p{margin-bottom:0.4rem;}
    .ch-instr-content p:empty{display:none;}
    .ch-instr-content ul{padding-left:1.5rem;margin-bottom:0.5rem;}
    .ch-instr-content ul li{list-style:disc;margin-bottom:0.2rem;}
    .ch-instr-content ol{padding-left:1.5rem;margin-bottom:0.5rem;}
    .ch-instr-content ol li{list-style:decimal;margin-bottom:0.2rem;}
    .ch-instr-content strong{font-weight:700;}
    .ch-instr-content em{font-style:italic;}
    /* Checklist failed state */
    .ch-check-item.failed{background:#fef2f2;border-color:#fca5a5;color:#991b1b;}
    .assignment-card{background:var(--card);border-radius:12px;border:2px solid #e9d5ff;margin:2rem 0;overflow:hidden;transition:border-color 0.3s;}
    .assignment-card.pending{border-color:#fde68a;}
    .assignment-card.needs-revision{border-color:#fca5a5;}
    .assignment-card.passed{border-color:#86efac;}
    .assignment-header{padding:1.1rem 1.5rem;background:var(--purple-light);border-bottom:2px solid #e9d5ff;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
    .assignment-card.pending .assignment-header{background:#fef9c3;border-bottom-color:#fde68a;}
    .assignment-card.needs-revision .assignment-header{background:#fef2f2;border-bottom-color:#fca5a5;}
    .assignment-card.passed .assignment-header{background:var(--green-light);border-bottom-color:#a7f3d0;}
    .asgn-badge-wrap{display:flex;flex-direction:column;gap:0.2rem;}
    .asgn-badge{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--purple);}
    .assignment-card.pending .asgn-badge{color:#92400e;}
    .assignment-card.needs-revision .asgn-badge{color:#991b1b;}
    .assignment-card.passed .asgn-badge{color:var(--green-dark);}
    .asgn-title{font-size:1rem;font-weight:700;}
    .asgn-status-badge{font-size:0.72rem;font-weight:600;padding:0.25rem 0.75rem;border-radius:99px;white-space:nowrap;flex-shrink:0;}
    .sb-pending{background:#fef3c7;color:#92400e;}
    .sb-revision{background:#fee2e2;color:#991b1b;}
    .sb-passed{background:#dcfce7;color:#166534;}
    .assignment-body{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem;}
    .asgn-instructions{font-size:0.9rem;line-height:1.7;}
    .req-label{font-size:0.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;}
    .req-checklist{display:flex;flex-direction:column;gap:0.4rem;}
    .req-item{display:flex;align-items:center;gap:0.65rem;font-size:0.875rem;}
    .req-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.65rem;}
    .req-box.checked{background:#dcfce7;border-color:#86efac;color:#166534;}
    .pts-pill{font-size:0.75rem;font-weight:600;color:var(--purple);background:var(--purple-light);padding:0.2rem 0.65rem;border-radius:99px;display:inline-block;}
    .sub-label{font-size:0.78rem;font-weight:600;color:var(--text);margin-bottom:0.4rem;}
    .sub-textarea{width:100%;min-height:160px;padding:0.75rem;border:1.5px solid var(--border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:0.85rem;line-height:1.6;resize:vertical;outline:none;transition:border-color 0.15s;color:var(--text);background:var(--bg);}
    .sub-textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,0.1);}
    .sub-textarea[readonly]{background:#f8fafc;cursor:default;}
    .btn-submit{padding:0.6rem 1.5rem;background:var(--purple);color:#fff;border:none;border-radius:8px;font:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;transition:background 0.15s;}
    .btn-submit:hover:not(:disabled){background:#6d28d9;}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed;}
    .feedback-box{padding:0.85rem 1rem;border-radius:8px;font-size:0.875rem;line-height:1.6;}
    .feedback-box.revision{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;}
    .feedback-box.passed{background:#f0fdf4;border:1px solid #86efac;color:#166534;}
    .feedback-box strong{display:block;margin-bottom:0.35rem;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.04em;}
    .lesson-nav{display:flex;justify-content:space-between;align-items:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);gap:1rem;}
    .btn-nav{display:inline-flex;align-items:center;gap:0.5rem;padding:0.65rem 1.4rem;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--text);font:inherit;font-size:0.875rem;font-weight:600;cursor:pointer;text-decoration:none;transition:background 0.15s,border-color 0.15s;}
    .btn-nav:hover:not(.locked-nav){background:var(--bg);border-color:#b0b8c8;}
    .btn-nav.primary{background:var(--green);color:#fff;border-color:var(--green);}
    .btn-nav.primary:hover:not(.locked-nav){background:var(--green-dark);}
    .btn-nav.locked-nav{opacity:0.45;cursor:not-allowed;}
    .btn-complete{display:inline-flex;align-items:center;gap:0.5rem;padding:0.65rem 1.6rem;border-radius:8px;border:none;background:var(--green);color:#fff;font:inherit;font-size:0.875rem;font-weight:600;cursor:pointer;transition:background 0.15s,opacity 0.15s;}
    .btn-complete:hover:not(:disabled){background:var(--green-dark);}
    .btn-complete:disabled{opacity:0.45;cursor:not-allowed;background:var(--muted);}
    .btn-complete.done{background:#0f766e;}
    .complete-hint{font-size:0.75rem;color:var(--muted);margin-top:0.4rem;text-align:center;}
    .editor-overlay{position:fixed;inset:0;background:rgba(10,10,20,0.75);backdrop-filter:blur(3px);z-index:200;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.2s;}
    .editor-overlay.open{opacity:1;pointer-events:all;}
    .editor-topbar{background:#1e1e2e;padding:0.7rem 1.25rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid #333;}
    .editor-label{color:#fff;font-size:0.875rem;font-weight:600;}
    .btn-run{padding:0.4rem 1rem;background:var(--green);color:#fff;border:none;border-radius:6px;font:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;}
    .btn-run:hover{background:var(--green-dark);}
    .btn-reset{padding:0.4rem 0.9rem;background:rgba(255,255,255,0.1);color:#ccc;border:1px solid rgba(255,255,255,0.2);border-radius:6px;font:inherit;font-size:0.8rem;cursor:pointer;}
    .btn-close-editor{margin-left:auto;padding:0.4rem 0.9rem;background:#ef4444;color:#fff;border:none;border-radius:6px;font:inherit;font-size:0.8rem;cursor:pointer;}
    .editor-body{display:flex;flex:1;overflow:hidden;}
    .editor-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .editor-pane-label{background:#252535;padding:0.4rem 1rem;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.05em;}
    .editor-pane:last-child{border-left:2px solid #333;}
    #tryItFrame{flex:1;border:none;background:#fff;}
    @media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;padding:1.25rem;}.challenge-split{flex-direction:column;}}
  </style>
</head>
<body>
<div class="topbar">
  <a href="/dashboard.html" class="topbar-logo">🎓 MyLMS</a>
  <div style="flex:1;display:flex;align-items:center;gap:0.75rem;min-width:0;">
    <div class="progress-track"><div class="progress-fill" id="topProgress" style="width:0%"></div></div>
    <span class="progress-label" id="topProgressLabel">Loading…</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-user" id="topUser"></span>
    <a href="/dashboard.html" class="btn-back-top">← Dashboard</a>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="sidebar-course-title" id="sidebarCourseTitle">Loading…</div></div>
    <div id="sidebarLessons"></div>
  </aside>
  <main class="main" id="mainContent">
    <div style="padding:3rem;text-align:center;color:#94a3b8">Loading lesson…</div>
  </main>
</div>

<div class="editor-overlay" id="editorOverlay">
  <div class="editor-topbar">
    <span class="editor-label">✏️ Try it Yourself</span>
    <button class="btn-run" onclick="runTryIt()">▶ Run</button>
    <button class="btn-reset" onclick="resetTryIt()">↺ Reset</button>
    <button class="btn-close-editor" onclick="closeEditor()">✕ Close</button>
  </div>
  <div class="editor-body">
    <div class="editor-pane" style="display:flex;flex-direction:column;">
      <div class="editor-pane-label">HTML Editor</div>
      <textarea id="tryItSource"></textarea>
    </div>
    <div class="editor-pane">
      <div class="editor-pane-label">Preview</div>
      <iframe id="tryItFrame"></iframe>
    </div>
  </div>
</div>

<script>
let lesson=null, allLessons=[], completedIds=new Set(), currentUser=null;
let tryItEditor=null, tryItOriginalCode='';
let blockPassed={}, totalInteractive=0;
let challengeEditors={}, challengeAttempts={};
let selectedOptions={};
let submissionIds={};
let assignmentBlocks={};
let tryitBlocks={};
let passedInteractiveIndices=new Set();
let passedExerciseAnswers={};

async function init(){
  const meRes=await fetch('/api/me').catch(()=>null);
  if(!meRes?.ok){window.location.href='/login.html';return;}
  currentUser=await meRes.json();
  document.getElementById('topUser').textContent=currentUser.name;
  const lessonId=new URLSearchParams(location.search).get('id');
  if(!lessonId){setMainContent('<p style="padding:2rem;color:#94a3b8">No lesson ID provided.</p>');return;}
  try{
    const lessonRes=await fetch('/api/lessons/'+lessonId);
    if(!lessonRes.ok){setMainContent('<p style="padding:2rem;color:#ef4444">Lesson not found.</p>');return;}
    lesson=await lessonRes.json();
    const[siblingsRes,coursesRes,progressRes,subsRes]=await Promise.all([
      fetch('/api/courses/'+lesson.course_id+'/lessons'),
      fetch('/api/courses'),
      fetch('/api/lessons/'+lessonId+'/progress').catch(()=>null),
      fetch('/api/lessons/'+lessonId+'/submissions').catch(()=>null)
    ]);
    allLessons=await siblingsRes.json();
    completedIds=new Set(allLessons.filter(l=>l.completed).map(l=>l.id));
    const courses=await coursesRes.json();
    const course=courses.find(c=>c.id===lesson.course_id);
    if(progressRes?.ok){
      const progress=await progressRes.json();
      progress.forEach(p=>{
        if(p.passed){
          passedInteractiveIndices.add(p.interactive_index);
          if(p.answer_index!=null) passedExerciseAnswers[p.exercise_index]=p.answer_index;
        }
      });
    }
    const isDone=completedIds.has(lesson.id);
    let existingSubs=[];
    if(subsRes?.ok) existingSubs=await subsRes.json();
    renderSidebar(course);
    renderTopProgress();
    renderLesson();
    restoreInteractiveState(isDone);
    existingSubs.forEach(sub=>{
      const asI=sub.assignment_index;
      if(asI==null)return;
      let content={};try{content=JSON.parse(lesson.content||'{}');}catch(_){}
      const asgnBlockList=(content.blocks||[]).filter(b=>b.type==='assignment');
      const block=asgnBlockList[asI];
      if(!block)return;
      submissionIds[asI]=sub.id;
      loadAssignmentState(asI,sub,block);
    });
  }catch(e){setMainContent('<p style="padding:2rem;color:#ef4444">Failed to load: '+e.message+'</p>');}
}

function restoreInteractiveState(lessonAlreadyDone){
  let content={};try{content=JSON.parse(lesson.content||'{}');}catch(_){}
  const blocks=content.blocks||[];
  let exI=0,chI=0,asI=0,iI=0;
  for(const b of blocks){
    if(['exercise','challenge','assignment'].includes(b.type)){
      const alreadyPassed=lessonAlreadyDone||passedInteractiveIndices.has(iI);
      if(alreadyPassed && b.type==='exercise'){
        document.getElementById('exercise-'+exI)?.classList.add('passed');
        const numEl=document.querySelector('#exercise-'+exI+' .exercise-number');
        if(numEl)numEl.style.color='var(--green)';
        const savedAnswerIdx=passedExerciseAnswers[exI];
        (b.options||[]).forEach((_,i)=>{
          const btn=document.getElementById('opt-'+exI+'-'+i);
          if(!btn)return;
          btn.disabled=true;
          if(savedAnswerIdx!=null && i===savedAnswerIdx) btn.classList.add('correct');
        });
        const checkBtn=document.getElementById('ex-check-'+exI);
        if(checkBtn){checkBtn.textContent='✓ Passed';checkBtn.style.background='var(--green)';checkBtn.disabled=true;}
        const fb=document.getElementById('ex-fb-'+exI);
        if(fb){fb.textContent='✅ Correct! Well done.';fb.className='exercise-feedback show success';}
        document.getElementById('ex-hint-btn-'+exI)?.remove();
        blockPassed[iI]=true;
        updateProgressDot(iI,true);
      }
      if(alreadyPassed && b.type==='challenge'){
        document.getElementById('challenge-'+chI)?.classList.add('passed');
        const hdr=document.querySelector('#challenge-'+chI+' .challenge-header');
        if(hdr){hdr.style.background='var(--green-light)';hdr.style.borderBottomColor='#a7f3d0';}
        const badge=document.querySelector('#challenge-'+chI+' .challenge-badge');
        if(badge)badge.style.color='var(--green-dark)';
        const checkBtn=document.getElementById('ch-check-'+chI);
        if(checkBtn){checkBtn.textContent='✓ Passed';checkBtn.style.background='var(--green)';checkBtn.disabled=true;}
        const fb=document.getElementById('ch-fb-'+chI);
        if(fb){fb.textContent='✅ Previously passed.';fb.className='ch-feedback show success';}
        document.getElementById('ch-hint-btn-'+chI)?.remove();
        blockPassed[iI]=true;
        updateProgressDot(iI,true);
      }
      if(alreadyPassed && b.type==='assignment'){
        blockPassed[iI]=true;
        updateProgressDot(iI,true);
      }
      if(b.type==='exercise')exI++;
      if(b.type==='challenge')chI++;
      if(b.type==='assignment')asI++;
      iI++;
    }
  }
  const passedCount=Object.values(blockPassed).filter(Boolean).length;
  const countEl=document.getElementById('bp-count');
  if(countEl)countEl.textContent=passedCount+'/'+totalInteractive;
  if(totalInteractive>0 && Object.values(blockPassed).every(Boolean)){
    unlockNextBtn();
  } else if(lessonAlreadyDone && totalInteractive===0){
    unlockNextBtn();
  }
}

function updateProgressDot(iI,passed){
  const dot=document.getElementById('bp-dot-'+iI);
  if(dot&&passed)dot.classList.add('passed');
}

function setMainContent(html){document.getElementById('mainContent').innerHTML=html;}

function renderSidebar(course){
  document.getElementById('sidebarCourseTitle').textContent=course?.title||'Course';
  const container=document.getElementById('sidebarLessons');
  const byModule={};
  allLessons.forEach(l=>{const m=l.module_number||1;if(!byModule[m])byModule[m]=[];byModule[m].push(l);});
  let html='';
  for(const[mod,lessons] of Object.entries(byModule)){
    html+=`<div class="sidebar-module">Module ${mod}</div>`;
    for(const l of lessons){
      const isCurrent=l.id===lesson.id, isDone=completedIds.has(l.id), isLocked=!l.unlocked&&!isDone&&!isCurrent;
      const sc=isCurrent?'active':isLocked?'locked':'';
      const ic=isDone?'done':isCurrent?'active-icon':isLocked?'locked':'';
      const icon=isDone?'✓':isLocked?'🔒':l.order_num;
      html+=`<a class="sidebar-lesson ${sc}" href="${isLocked?'#':'lesson.html?id='+l.id}" ${isLocked?'onclick="return false"':''}><div class="lesson-icon ${ic}">${icon}</div><span>${esc(l.title)}</span></a>`;
    }
  }
  container.innerHTML=html;
}

function renderTopProgress(){
  const idx=allLessons.findIndex(l=>l.id===lesson.id),total=allLessons.length;
  const pct=total>0?Math.round((completedIds.size/total)*100):0;
  document.getElementById('topProgress').style.width=pct+'%';
  document.getElementById('topProgressLabel').textContent='Lesson '+(idx+1)+' of '+total+' · Module '+(lesson.module_number||1);
}

function renderLesson(){
  let content={};try{content=JSON.parse(lesson.content||'{}');}catch(_){}
  const blocks=content.blocks||[];
  const idx=allLessons.findIndex(l=>l.id===lesson.id);
  const prev=allLessons[idx-1]||null, next=allLessons[idx+1]||null;
  const isDone=completedIds.has(lesson.id);
  const interactiveBlocks=blocks.filter(b=>['exercise','challenge','assignment'].includes(b.type));
  totalInteractive=interactiveBlocks.length;
  interactiveBlocks.forEach((_,i)=>{blockPassed[i]=false;});

  let html='<div class="lesson-meta">Module '+(lesson.module_number||1)+' › Lesson '+lesson.order_num+'</div>';
  html+='<h1 class="lesson-title">'+esc(lesson.title)+'</h1>';
  if(totalInteractive>1){
    let dots='', iIdx=0;
    blocks.forEach(b=>{
      if(['exercise','challenge','assignment'].includes(b.type)){
        dots+=`<div class="bp-dot ${b.type}" id="bp-dot-${iIdx}" title="${b.type} ${iIdx+1}"></div>`;iIdx++;
      }
    });
    html+=`<div class="block-progress"><span class="bp-label">Progress:</span><div class="bp-dots">${dots}</div><span id="bp-count" style="font-size:0.78rem;color:var(--muted);margin-left:0.25rem">0/${totalInteractive}</span></div>`;
  }

  tryitBlocks={};
  assignmentBlocks={};
  let exI=0,chI=0,asI=0,iI=0;
  for(const b of blocks){

    // ── THEORY: render rich HTML directly (no arrow bullets) ──
    if(b.type==='theory'){
      if(b.label)html+=`<h2 class="section-heading">${esc(b.label)}</h2>`;
      const rawContent = b.content || '';
      // Detect if content is already HTML (from Quill) or plain text (legacy)
      const isHTML = /<[a-z][\s\S]*>/i.test(rawContent);
      let theoryHTML = '';
      if(isHTML){
        // New Quill content — render as-is
        theoryHTML = rawContent;
      } else {
        // Legacy plain text — convert each non-empty line to a <p>
        theoryHTML = rawContent
          .split('\n')
          .map(l => l.trim())
          .filter(l => l.length > 0)
          .map(l => `<p>${escHtml(l)}</p>`)
          .join('');
      }
      html+=`<div class="theory-content">${theoryHTML}</div>`;
    }

    if(b.type==='code'){
      html+=`<div class="code-block-wrap">`;
      if(b.label)html+=`<div class="code-block-label">${esc(b.label)}</div>`;
      html+=`<pre><code class="language-html">${escHtml(b.code||'')}</code></pre>`;
      if(b.tryit){
        const tIdx=Object.keys(tryitBlocks).length;
        tryitBlocks[tIdx]=b.code||'';
        html+=`<button class="btn-try" onclick="openTryIt(${tIdx})">▶ Try it Yourself »</button>`;
      }
      html+=`</div>`;
    }
    if(b.type==='note'){const icons={tip:'💡 Tip',info:'ℹ Note',warning:'⚠ Warning'};html+=`<div class="note-box ${b.noteType||'tip'}"><strong>${icons[b.noteType||'tip']}</strong>${esc(b.content||'')}</div>`;}
    if(b.type==='tryit'){
      const tIdx=Object.keys(tryitBlocks).length;
      tryitBlocks[tIdx]=b.code||'';
      html+=`<button class="btn-try" onclick="openTryIt(${tIdx})">▶ Try it Yourself »</button>`;
    }
    if(b.type==='exercise'){html+=buildExerciseHTML(b,exI,iI);exI++;iI++;}
    if(b.type==='challenge'){html+=buildChallengeHTML(b,chI,iI);chI++;iI++;}
    if(b.type==='assignment'){html+=buildAssignmentHTML(b,asI,iI);asI++;iI++;}
  }

  const allBlocksDone=totalInteractive===0||Object.values(blockPassed).every(Boolean)||isDone;
  const nextLocked=!allBlocksDone;
  // Complete Lesson button logic:
  // - No activities → always enabled
  // - Has activities → locked until all passed
  const hasActivities=totalInteractive>0;
  const completeLocked=hasActivities&&!allBlocksDone;
  const alreadyDone=completedIds.has(lesson.id);

  html+=`<div class="lesson-nav">`;
  html+=prev?`<a class="btn-nav" href="lesson.html?id=${prev.id}">← ${esc(prev.title)}</a>`:`<span></span>`;

  // Right side: Complete button + optional Next
  html+=`<div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem">`;
  if(next){
    // Show Complete + Next together
    html+=`<div style="display:flex;gap:0.65rem;align-items:center">`;
    html+=`<button class="btn-complete${alreadyDone?' done':''}" id="completeBtn" ${completeLocked?'disabled':''} onclick="handleCompleteLesson()">${alreadyDone?'✅ Completed':'✔ Complete Lesson'}</button>`;
    html+=`<button class="btn-nav primary ${nextLocked?'locked-nav':''}" id="nextBtn" title="${nextLocked?'Complete all activities to unlock':''}">${esc(next.title)} →</button>`;
    html+=`</div>`;
  } else {
    // Last lesson — only Complete button
    html+=`<button class="btn-complete${alreadyDone?' done':''}" id="completeBtn" ${completeLocked?'disabled':''} onclick="handleCompleteLesson()">${alreadyDone?'✅ Completed':'✔ Complete Lesson'}</button>`;
  }
  if(completeLocked){
    html+=`<span class="complete-hint">⚡ Complete all activities to unlock</span>`;
  }
  html+=`</div>`;
  html+=`</div>`;

  setMainContent(html);
  document.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));
  if(!nextLocked)unlockNextBtn();
  // If no activities, complete button is always enabled — wire it up immediately
  if(totalInteractive===0){
    const cBtn=document.getElementById('completeBtn');
    if(cBtn&&!alreadyDone){
      cBtn.disabled=false;
    }
  }
  let chIdx2=0;
  blocks.forEach(b=>{if(b.type==='challenge'){const i2=chIdx2;setTimeout(()=>initChallengeEditor(i2,b),80+i2*60);chIdx2++;}});
}

function buildExerciseHTML(b,exI,iI){
  const letters=['A','B','C','D','E','F'];
  const opts=(b.options||[]).map((o,i)=>`<button class="option-btn" id="opt-${exI}-${i}" onclick="selectOption(${exI},${i})"><div class="option-letter">${letters[i]}</div><span>${esc(o.text)}</span></button>`).join('');
  const num=totalInteractive>1?`📝 Exercise ${iI+1}`:'📝 Exercise';
  return`<div class="exercise-card" id="exercise-${exI}"><div class="exercise-number">${num}</div><div class="exercise-question">${esc(b.question)}</div><div class="option-list" id="opt-list-${exI}">${opts}</div><div class="exercise-actions"><button class="btn-check" id="ex-check-${exI}" onclick="checkAnswer(${exI},${iI})" disabled>Check Answer</button>${b.hint?`<button class="btn-hint" id="ex-hint-btn-${exI}" onclick="showExHint(${exI})" style="display:none">💡 Hint</button>`:''}</div><div class="exercise-feedback" id="ex-fb-${exI}"></div>${b.hint?`<div class="hint-box" id="ex-hint-box-${exI}"><strong>💡 Hint:</strong> ${esc(b.hint)}</div>`:''}</div>`;
}
function selectOption(exI,optI){if(blockPassed[getIIforEx(exI)])return;selectedOptions[exI]=optI;document.querySelectorAll('#opt-list-'+exI+' .option-btn').forEach(b=>b.classList.remove('selected'));document.getElementById('opt-'+exI+'-'+optI)?.classList.add('selected');document.getElementById('ex-check-'+exI).disabled=false;}
async function checkAnswer(exI,iI){
  const optI=selectedOptions[exI];if(optI===undefined)return;
  const btn=document.getElementById('ex-check-'+exI);btn.disabled=true;btn.textContent='…';
  let content={};try{content=JSON.parse(lesson.content||'{}');}catch(_){}
  const exBlocks=(content.blocks||[]).filter(b=>b.type==='exercise');
  const block=exBlocks[exI];if(!block)return;
  const correct=block.options[optI]?.correct||false;
  try{await fetch('/api/exercises/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lesson_id:lesson.id,exercise_index:exI,interactive_index:iI,answer_index:optI,passed:correct})});}catch(_){}
  if(correct){
    block.options.forEach((_,i)=>{const b=document.getElementById('opt-'+exI+'-'+i);if(!b)return;b.disabled=true;if(i===optI)b.classList.add('correct');else b.classList.remove('selected');});
    const fb=document.getElementById('ex-fb-'+exI);fb.textContent='✅ Correct! Well done.';fb.className='exercise-feedback show success';
    document.getElementById('exercise-'+exI)?.classList.add('passed');
    btn.textContent='✓ Passed';btn.style.background='var(--green)';btn.disabled=true;
    document.getElementById('ex-hint-btn-'+exI)?.remove();
    onBlockPassed(iI);
  }else{
    const wrongBtn=document.getElementById('opt-'+exI+'-'+optI);if(wrongBtn){wrongBtn.classList.remove('selected');wrongBtn.classList.add('incorrect');}
    const fb=document.getElementById('ex-fb-'+exI);fb.textContent='❌ Not quite — try again!';fb.className='exercise-feedback show error';
    const hintBtn=document.getElementById('ex-hint-btn-'+exI);if(hintBtn)hintBtn.style.display='';
    setTimeout(()=>{if(wrongBtn)wrongBtn.classList.remove('incorrect');selectedOptions[exI]=undefined;document.querySelectorAll('#opt-list-'+exI+' .option-btn').forEach(b=>b.classList.remove('selected'));btn.disabled=false;btn.textContent='Try Again';},900);
  }
}
function showExHint(exI){document.getElementById('ex-hint-box-'+exI)?.classList.add('show');document.getElementById('ex-hint-btn-'+exI)?.remove();}

function getIIforEx(exI){
  let content={};try{content=JSON.parse(lesson.content||'{}');}catch(_){}
  const blocks=content.blocks||[];let iI=0,eI=0;
  for(const b of blocks){if(['exercise','challenge','assignment'].includes(b.type)){if(b.type==='exercise'&&eI===exI)return iI;iI++;if(b.type==='exercise')eI++;}}
  return iI;
}

// Store challenge meta safely — avoids JSON injection in onclick attrs
let challengeMeta={};

function buildInstrHtml(text){
  if(!text)return'';
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  let html='';
  for(const line of lines){
    const numbered=/^(\d+)[\.\)\:]\s+(.+)$/.exec(line);
    if(numbered){
      html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">`
        +`<span style="min-width:26px;width:26px;height:26px;border-radius:50%;background:#f97316;color:#fff;font-size:0.75rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${numbered[1]}</span>`
        +`<span style="font-size:0.9rem;color:#1e293b;line-height:1.5;">${escHtml(numbered[2])}</span>`
        +`</div>`;
    } else {
      html+=`<div style="font-size:0.9rem;line-height:1.6;margin-bottom:6px;color:#1e293b;">${escHtml(line)}</div>`;
    }
  }
  return html;
}

function buildChallengeHTML(b,chI,iI){
  challengeAttempts[chI]=0;
  challengeMeta[chI]={
    expectedOutput : b.expectedOutput||'',
    matchMode      : b.matchMode||'contains',
    iI,
    starter        : b.starterCode||'',
    solution       : b.solutionCode||'',
    hint           : b.hint||'',
    requirements   : b.requirements||[]
  };

  const num = totalInteractive>1 ? `🏆 Code Challenge ${iI+1}` : '🏆 Code Challenge';
  const starter = escHtml(b.starterCode||'<!-- Build your HTML page here -->');

  // Instructions: rich HTML from Quill — render as-is
  const instrHtml = b.instructions
    ? `<div class="ch-instr-content">${b.instructions}</div>`
    : '';

  // Checklist — only from teacher-defined requirements
  const reqs = b.requirements||[];
  const checklistHtml = reqs.length > 0
    ? `<div class="ch-checklist">
        <div class="ch-checklist-title">Checklist</div>
        ${reqs.map((r,ri)=>`
          <div class="ch-check-item" id="ch-ci-${chI}-${ri}">
            <div class="ch-check-box" id="ch-cb-${chI}-${ri}"></div>
            <span>${escHtml(r)}</span>
          </div>`).join('')}
      </div>`
    : '';

  return `<div class="challenge-card" id="challenge-${chI}">
    <div class="ch-top">
      <div class="ch-badge-row"><span class="ch-badge" id="ch-badge-${chI}">${num}</span></div>
      <div class="ch-main-title">${esc(b.label||'Code Challenge')}</div>
      ${instrHtml}
    </div>
    <div class="ch-split-wrap">
      <div class="ch-editor-side">
        <div class="ch-editor-tabs">
          <button class="ch-tab active" id="ch-tab-code-${chI}" onclick="switchChTab(${chI},'code')">Code</button>
          <button class="ch-tab" id="ch-tab-sol-${chI}" onclick="switchChTab(${chI},'solution')">Solution</button>
          <button class="ch-check-btn" id="ch-check-${chI}" onclick="checkChallenge(${chI})">Check Code</button>
        </div>
        <div class="ch-code-area" id="ch-code-area-${chI}">
          <textarea id="ch-ta-${chI}">${starter}</textarea>
        </div>
        <div class="ch-solution-area" id="ch-sol-${chI}"></div>
      </div>
      <div class="ch-result-side">
        <div class="ch-result-header">
          <div class="ch-mac-dots">
            <div class="ch-dot red"></div>
            <div class="ch-dot yellow"></div>
            <div class="ch-dot green"></div>
          </div>
          <span class="ch-result-label">Result</span>
        </div>
        <div class="ch-result-placeholder" id="ch-placeholder-${chI}">Click <strong style="color:#10b981;">Check Code</strong> to see the result here.</div>
        <iframe class="ch-result-frame" id="ch-iframe-${chI}" style="display:none;"></iframe>
      </div>
    </div>
    <div class="ch-feedback-bar" id="ch-fb-${chI}"></div>
    ${b.hint ? `<div class="ch-hint-bar" id="ch-hint-${chI}"><strong>💡 Hint:</strong> ${esc(b.hint)}</div>` : ''}
    ${checklistHtml}
  </div>`;
}
function initChallengeEditor(chI,block){
  const ta=document.getElementById('ch-ta-'+chI);
  if(!ta||challengeEditors[chI])return;
  const cm=CodeMirror.fromTextArea(ta,{
    mode:'htmlmixed',theme:'dracula',lineNumbers:true,lineWrapping:true,indentUnit:2,tabSize:2
  });
  cm.getWrapperElement().style.minHeight='220px';
  cm.getWrapperElement().style.height='220px';
  challengeEditors[chI]={cm, starter:block.starterCode||'<!-- Build your HTML page here -->'};

  // If already passed on load, lock immediately after editor initializes
  const meta = challengeMeta[chI]||{};
  const iI   = meta.iI ?? chI;
  if(blockPassed[iI]) lockChallengeEditor(chI);
}

function lockChallengeEditor(chI){
  const e = challengeEditors[chI];
  if(e){
    e.cm.setOption('readOnly','nocursor');
    e.cm.getWrapperElement().style.opacity='0.75';
  }
  const btn = document.getElementById('ch-check-'+chI);
  if(btn){ btn.textContent='✓ Passed'; btn.classList.add('passed-btn'); btn.disabled=true; }
  document.getElementById('challenge-'+chI)?.classList.add('passed');
  const badge = document.getElementById('ch-badge-'+chI);
  if(badge) badge.classList.add('passed-badge');
  const fb = document.getElementById('ch-fb-'+chI);
  if(fb){ fb.textContent='🎉 You already passed this challenge!'; fb.className='ch-feedback-bar show success'; }
  const hintBar = document.getElementById('ch-hint-'+chI);
  if(hintBar) hintBar.classList.remove('show');

  // ── Check all checklist items as passed ──
  const meta = challengeMeta[chI]||{};
  const reqs = meta.requirements||[];
  reqs.forEach((_,ri)=>{
    const item = document.getElementById('ch-ci-'+chI+'-'+ri);
    const box  = document.getElementById('ch-cb-'+chI+'-'+ri);
    if(item){ item.classList.add('checked'); item.classList.remove('failed'); }
    if(box){ box.textContent='✓'; box.style.background=''; box.style.borderColor=''; box.style.color=''; }
  });
}

function switchChTab(chI, tab){
  const codeArea = document.getElementById('ch-code-area-'+chI);
  const solArea  = document.getElementById('ch-sol-'+chI);
  const codeTab  = document.getElementById('ch-tab-code-'+chI);
  const solTab   = document.getElementById('ch-tab-sol-'+chI);
  const meta     = challengeMeta[chI]||{};

  if(tab==='code'){
    if(codeArea) codeArea.style.display='';
    if(solArea)  solArea.style.display='none';
    codeTab?.classList.add('active');
    solTab?.classList.remove('active');
  } else {
    // Solution tab — render with CodeMirror for syntax highlighting + line breaks
    if(codeArea) codeArea.style.display='none';
    if(solArea){
      solArea.style.display='block';
      // If not yet initialized, create a read-only CodeMirror instance
      if(!solArea.dataset.init){
        solArea.dataset.init='1';
        const ta=document.createElement('textarea');
        ta.value=meta.solution||'<!-- No solution provided -->';
        solArea.appendChild(ta);
        const cm=CodeMirror.fromTextArea(ta,{
          mode:'htmlmixed',theme:'dracula',lineNumbers:true,
          lineWrapping:true,readOnly:true,indentUnit:2,tabSize:2
        });
        cm.getWrapperElement().style.minHeight='220px';
        cm.getWrapperElement().style.height='220px';
        setTimeout(()=>cm.refresh(),50);
      }
    }
    codeTab?.classList.remove('active');
    solTab?.classList.add('active');
  }
}

function runChallengeInFrame(chI, code){
  const frame       = document.getElementById('ch-iframe-'+chI);
  const placeholder = document.getElementById('ch-placeholder-'+chI);
  if(!frame) return;
  if(placeholder) placeholder.style.display='none';
  frame.style.display='block';
  const doc=frame.contentDocument||frame.contentWindow.document;
  doc.open(); doc.write(code); doc.close();
}

function highlightMatchedLines(chI, code, reqs){
  const e = challengeEditors[chI];
  if(!e) return;
  const cm = e.cm;
  // Clear existing highlights
  cm.getAllMarks().forEach(m=>m.clear());
  const lines = code.split('\n');
  lines.forEach((line,i)=>{
    const lineLower = line.toLowerCase();
    // Highlight line green if it contains any req keyword or is meaningful code
    const isCode = line.trim() && !line.trim().startsWith('<!--');
    const matchesReq = reqs.some(r=>{
      const keywords = r.toLowerCase().replace(/<[^>]+>/g,'').split(/\s+/).filter(w=>w.length>2);
      return keywords.some(k=>lineLower.includes(k));
    });
    if(isCode || matchesReq){
      cm.addLineClass(i,'background','ch-line-pass');
    }
  });
}


async function checkChallenge(chI){
  const meta           = challengeMeta[chI]||{};
  const iI             = meta.iI ?? chI;
  const expectedOutput = meta.expectedOutput||'';
  const matchMode      = meta.matchMode||'contains';
  const reqs           = meta.requirements||[];
  const starter        = meta.starter||'<!-- Build your HTML page here -->';

  if(blockPassed[iI]) return;

  const e    = challengeEditors[chI];
  const code = e ? e.cm.getValue() : (document.getElementById('ch-ta-'+chI)?.value||'');
  const fb   = document.getElementById('ch-fb-'+chI);

  // ── Empty / unchanged ──
  const trimmed = code.trim();
  if(!trimmed || trimmed === starter.trim() || trimmed === '<!-- Build your HTML page here -->'){
    fb.textContent = 'The editor has not been used yet. Replace the comment with real code.';
    fb.className   = 'ch-feedback-bar show warning';
    runChallengeInFrame(chI,
      `<body style="font-family:monospace;color:#ef4444;padding:1rem;font-size:0.85rem;">
        No changes have been made. Edit the code and try again.
      </body>`
    );
    return;
  }

  // ── Run code in result pane ──
  runChallengeInFrame(chI, code);
  await new Promise(r=>setTimeout(r,350));

  const frame = document.getElementById('ch-iframe-'+chI);
  const fd    = frame?.contentDocument || frame?.contentWindow?.document;
  if(!fd) return;

  const renderedText = (fd.body?.innerText||'').trim().toLowerCase();
  const renderedHTML = (fd.body?.innerHTML||'').toLowerCase();
  const codeLC       = code.toLowerCase();
  const expected     = expectedOutput.trim().toLowerCase();

  // ── Check each requirement against student's raw code ──
  // Strategy: extract what the teacher wrote as the req text,
  // strip HTML tags to get the plain keywords, then check if those
  // tags/keywords appear literally in the student's code.
  let passedCount = 0;

  // Helper: extract HTML tags mentioned in requirement e.g. <!DOCTYPE html>, <h1>, </body>
  function extractTagsFromReq(req){
    // Match things like <!DOCTYPE html>, <html>, <h1>, </body>, etc.
    const tags=[];
    const tagRe=/<!?[a-zA-Z][^>]*>|<\/[a-zA-Z]+>/g;
    let m;
    // Also check the raw req (it may have &lt; &gt; encoded)
    const decoded=req.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
    while((m=tagRe.exec(decoded))!==null) tags.push(m[0].toLowerCase());
    return tags;
  }

  // Helper: extract plain text keywords (non-tag words) from requirement
  function extractKeywords(req){
    const decoded=req.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
    // Remove HTML tags, keep meaningful words
    return decoded.replace(/<[^>]+>/g,' ')
      .split(/\s+/)
      .map(w=>w.toLowerCase().replace(/[^a-z0-9]/g,''))
      .filter(w=>w.length>3);
  }

  reqs.forEach((r,ri)=>{
    const tags     = extractTagsFromReq(r);
    const keywords = extractKeywords(r);
    let reqPassed  = false;

    if(tags.length > 0){
      // If requirement mentions specific HTML tags, check those tags exist in code
      reqPassed = tags.every(tag => codeLC.includes(tag));
    } else if(keywords.length > 0){
      // Otherwise check keywords against rendered output
      reqPassed = keywords.every(kw => renderedText.includes(kw) || codeLC.includes(kw));
    } else {
      reqPassed = true; // empty req always passes
    }

    const item = document.getElementById('ch-ci-'+chI+'-'+ri);
    const box  = document.getElementById('ch-cb-'+chI+'-'+ri);
    if(item && box){
      if(reqPassed){
        item.classList.add('checked');
        item.classList.remove('failed');
        box.textContent       = '✓';
        box.style.background  = '';
        box.style.borderColor = '';
        box.style.color       = '';
        passedCount++;
      } else {
        item.classList.remove('checked');
        item.classList.add('failed');
        box.textContent       = '✕';
        box.style.background  = '#fee2e2';
        box.style.borderColor = '#fca5a5';
        box.style.color       = '#991b1b';
      }
    }
  });

  // ── Main pass/fail ──
  const passed = reqs.length > 0
    ? passedCount === reqs.length
    : (matchMode==='exact' ? renderedText===expected : renderedText.includes(expected)||renderedHTML.includes(expected));

  challengeAttempts[chI] = (challengeAttempts[chI]||0) + 1;

  // Highlight matched lines in editor
  highlightMatchedLines(chI, code, reqs);

  // Save to server
  try{
    await fetch('/api/exercises/check',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({lesson_id:lesson.id, exercise_index:chI, interactive_index:iI, answer_index:0, passed})
    });
  }catch(_){}

  if(passed){
    // All checklist items green
    reqs.forEach((_,ri)=>{
      const item = document.getElementById('ch-ci-'+chI+'-'+ri);
      const box  = document.getElementById('ch-cb-'+chI+'-'+ri);
      if(item){ item.classList.add('checked'); item.classList.remove('failed'); }
      if(box) { box.textContent='✓'; box.style.background=''; box.style.borderColor=''; box.style.color=''; }
    });

    fb.innerHTML  = '🎉 Great job! You nailed it!';
    fb.className  = 'ch-feedback-bar show success';

    document.getElementById('challenge-'+chI)?.classList.add('passed');
    const btn = document.getElementById('ch-check-'+chI);
    if(btn){ btn.textContent='✓ Passed'; btn.classList.add('passed-btn'); btn.disabled=true; }
    const badge = document.getElementById('ch-badge-'+chI);
    if(badge) badge.classList.add('passed-badge');

    const hintBar = document.getElementById('ch-hint-'+chI);
    if(hintBar) hintBar.classList.remove('show');

    onBlockPassed(iI);
    lockChallengeEditor(chI);
  } else {
    const allFailed = passedCount === 0;
    if(reqs.length > 0 && !allFailed){
      fb.textContent = 'Almost there! Fix the missing checklist items.';
      fb.className   = 'ch-feedback-bar show warning';
    } else {
      fb.textContent = 'Not quite — check your code and try again.';
      fb.className   = 'ch-feedback-bar show error';
    }

    // Show teacher hint after first fail
    if(challengeAttempts[chI] >= 1 && meta.hint){
      const hintBar = document.getElementById('ch-hint-'+chI);
      if(hintBar) hintBar.classList.add('show');
    }
  }
}
function showChallengeHint(chI){
  document.getElementById('ch-hint-'+chI)?.classList.add('show');
}

function buildAssignmentHTML(b,asI,iI){
  assignmentBlocks[asI]=b;
  const num=totalInteractive>1?`📋 Assignment ${iI+1}`:'📋 Assignment';
  const reqs=(b.requirements||[]).map((r,ri)=>`<div class="req-item"><div class="req-box" id="asgn-req-${asI}-${ri}"></div><span>${esc(r)}</span></div>`).join('');
  const isCode=(b.submissionType||'code')==='code';
  return`<div class="assignment-card" id="assignment-${asI}">
    <div class="assignment-header">
      <div class="asgn-badge-wrap"><div class="asgn-badge">${num}</div><div class="asgn-title">${esc(b.assignmentTitle)}</div></div>
      <div id="asgn-status-${asI}"></div>
    </div>
    <div class="assignment-body">
      <div class="asgn-instructions">${esc(b.instructions)}</div>
      ${reqs?`<div><div class="req-label">Requirements</div><div class="req-checklist" id="asgn-reqs-${asI}">${reqs}</div></div>`:''}
      <div class="pts-pill">${b.points||100} pts · ${isCode?'💻 Code':'📝 Text'} submission</div>
      <div id="asgn-feedback-${asI}"></div>
      <div id="asgn-area-${asI}">
        <div class="sub-label">${isCode?'Your HTML code':'Your answer'}</div>
        <textarea class="sub-textarea" id="asgn-ta-${asI}" placeholder="${isCode?'Paste your HTML code here…':'Write your answer here…'}"></textarea>
        <div style="margin-top:0.75rem;display:flex;align-items:center;gap:0.75rem">
          <button class="btn-submit" id="asgn-btn-${asI}" onclick="submitAssignment(${asI},${iI})">Submit Assignment</button>
          <span id="asgn-msg-${asI}" style="font-size:0.8rem;color:var(--muted)"></span>
        </div>
      </div>
    </div>
  </div>`;
}

function loadAssignmentState(asI,sub,block){
  const card=document.getElementById('assignment-'+asI);if(!card)return;
  const statusEl=document.getElementById('asgn-status-'+asI);
  const feedbackEl=document.getElementById('asgn-feedback-'+asI);
  const areaEl=document.getElementById('asgn-area-'+asI);
  if(sub.status==='pending'){
    card.classList.add('pending');
    if(statusEl)statusEl.innerHTML='<span class="asgn-status-badge sb-pending">⏳ Pending review</span>';
    if(areaEl)areaEl.innerHTML=`<div class="sub-label">Your submission</div><textarea class="sub-textarea" readonly>${esc(sub.code)}</textarea><p style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem">⏳ Awaiting teacher review.</p>`;
  }else if(sub.status==='needs_revision'){
    card.classList.add('needs-revision');
    if(statusEl)statusEl.innerHTML='<span class="asgn-status-badge sb-revision">↩ Needs revision</span>';
    if(feedbackEl&&sub.feedback)feedbackEl.innerHTML=`<div class="feedback-box revision"><strong>📝 Teacher Feedback</strong>${esc(sub.feedback)}</div>`;
    if(areaEl)areaEl.innerHTML=`<div class="sub-label">Update your ${(block.submissionType||'code')==='code'?'code':'answer'} and resubmit</div><textarea class="sub-textarea" id="asgn-ta-${asI}">${esc(sub.code)}</textarea><div style="margin-top:0.75rem;display:flex;align-items:center;gap:0.75rem"><button class="btn-submit" id="asgn-btn-${asI}" onclick="resubmitAssignment(${asI},${sub.id})">↩ Resubmit</button><span id="asgn-msg-${asI}" style="font-size:0.8rem;color:var(--muted)"></span></div>`;
  }else if(sub.status==='passed'){
    card.classList.add('passed');
    if(statusEl)statusEl.innerHTML='<span class="asgn-status-badge sb-passed">✅ Passed'+(sub.score?' — '+sub.score+'/'+(block.points||100):'')+' </span>';
    if(feedbackEl&&sub.feedback)feedbackEl.innerHTML=`<div class="feedback-box passed"><strong>✅ Teacher Feedback</strong>${esc(sub.feedback)}</div>`;
    let grades=[];try{grades=JSON.parse(sub.requirement_grades||'[]');}catch(_){}
    grades.forEach((g,i)=>{const box=document.getElementById('asgn-req-'+asI+'-'+i);if(box&&g){box.classList.add('checked');box.textContent='✓';}});
    if(areaEl)areaEl.innerHTML=`<div class="sub-label">Your submission</div><textarea class="sub-textarea" readonly>${esc(sub.code)}</textarea>`;
    const iI=getInteractiveIndex('assignment',asI);
    if(iI>=0)onBlockPassed(iI,true);
  }
}

function getInteractiveIndex(type,typeIdx){
  let content={};try{content=JSON.parse(lesson.content||'{}');}catch(_){}
  const blocks=content.blocks||[];let iI=0,typeCount=0;
  for(const b of blocks){
    if(['exercise','challenge','assignment'].includes(b.type)){
      if(b.type===type&&typeCount===typeIdx)return iI;
      iI++;if(b.type===type)typeCount++;
    }
  }
  return -1;
}

async function submitAssignment(asI,iI){
  const block=assignmentBlocks[asI];if(!block)return;
  const ta=document.getElementById('asgn-ta-'+asI);const code=ta?.value?.trim();
  if(!code){if(ta){ta.style.borderColor='#ef4444';setTimeout(()=>ta.style.borderColor='',1500);}return;}
  const btn=document.getElementById('asgn-btn-'+asI);btn.disabled=true;btn.textContent='Submitting…';
  try{
    const res=await fetch('/api/submissions/major',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lesson_id:lesson.id,assignment_index:asI,code,submission_type:block.submissionType||'code'})});
    if(!res.ok)throw new Error(await res.text());
    const saved=await res.json();
    submissionIds[asI]=saved.id;
    setPendingState(asI,code);
  }catch(e){
    btn.disabled=false;btn.textContent='Submit Assignment';
    const msg=document.getElementById('asgn-msg-'+asI);if(msg)msg.textContent='Submission failed. Try again.';
  }
}

async function resubmitAssignment(asI,subId){
  const ta=document.getElementById('asgn-ta-'+asI);const code=ta?.value?.trim();if(!code)return;
  const btn=document.getElementById('asgn-btn-'+asI);btn.disabled=true;btn.textContent='Resubmitting…';
  try{
    const res=await fetch('/api/submissions/'+subId+'/resubmit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    if(!res.ok)throw new Error();
    setPendingState(asI,code);
  }catch{btn.disabled=false;btn.textContent='↩ Resubmit';}
}

function setPendingState(asI,code){
  const card=document.getElementById('assignment-'+asI);if(card)card.className='assignment-card pending';
  const statusEl=document.getElementById('asgn-status-'+asI);if(statusEl)statusEl.innerHTML='<span class="asgn-status-badge sb-pending">⏳ Pending review</span>';
  const areaEl=document.getElementById('asgn-area-'+asI);if(areaEl)areaEl.innerHTML=`<div class="sub-label">Your submission</div><textarea class="sub-textarea" readonly>${esc(code)}</textarea><p style="font-size:0.8rem;color:var(--muted);margin-top:0.5rem">⏳ Awaiting teacher review.</p>`;
  const fbEl=document.getElementById('asgn-feedback-'+asI);if(fbEl)fbEl.innerHTML='';
}

function onBlockPassed(iI,silent=false){
  if(blockPassed[iI])return;
  blockPassed[iI]=true;
  updateProgressDot(iI,true);
  const passed=Object.values(blockPassed).filter(Boolean).length;
  const countEl=document.getElementById('bp-count');if(countEl)countEl.textContent=passed+'/'+totalInteractive;
  if(Object.values(blockPassed).every(Boolean)){if(!silent)autoCompleteLesson();unlockNextBtn();}
}
async function autoCompleteLesson(){
  if(completedIds.has(lesson.id))return;
  try{await fetch('/api/lessons/'+lesson.id+'/complete',{method:'POST'});completedIds.add(lesson.id);renderSidebar(null);renderTopProgress();}catch(_){}
}
function unlockNextBtn(){
  // Unlock Next button
  const btn=document.getElementById('nextBtn');
  if(btn){
    btn.classList.remove('locked-nav');btn.removeAttribute('title');
    const idx=allLessons.findIndex(l=>l.id===lesson.id);
    const nextLesson=allLessons[idx+1];
    if(nextLesson)btn.onclick=()=>location.href='lesson.html?id='+nextLesson.id;
  }
  // Unlock Complete button
  const cBtn=document.getElementById('completeBtn');
  if(cBtn){
    cBtn.disabled=false;
    const hintEl=document.querySelector('.complete-hint');
    if(hintEl)hintEl.remove();
  }
}

async function handleCompleteLesson(){
  const cBtn=document.getElementById('completeBtn');
  if(!cBtn||cBtn.disabled)return;
  cBtn.disabled=true;
  cBtn.textContent='Saving…';
  await autoCompleteLesson();
  cBtn.textContent='✅ Completed';
  cBtn.classList.add('done');
  cBtn.disabled=true;
}

function openTryIt(tIdx){
  const code=tryitBlocks[tIdx]||'<!DOCTYPE html>\n<html>\n<body>\n\n</body>\n</html>';
  tryItOriginalCode=code;
  document.getElementById('editorOverlay').classList.add('open');
  if(!tryItEditor){
    tryItEditor=CodeMirror.fromTextArea(document.getElementById('tryItSource'),{mode:'htmlmixed',theme:'dracula',lineNumbers:true,lineWrapping:true,indentUnit:2,tabSize:2});
    tryItEditor.getWrapperElement().style.height='calc(100vh - 96px)';
    tryItEditor.getWrapperElement().style.overflow='auto';
  }
  tryItEditor.setValue(tryItOriginalCode);tryItEditor.refresh();runTryIt();
}
function runTryIt(){const code=tryItEditor?tryItEditor.getValue():'';const frame=document.getElementById('tryItFrame');const doc=frame.contentDocument||frame.contentWindow.document;doc.open();doc.write(code);doc.close();}
function resetTryIt(){if(tryItEditor){tryItEditor.setValue(tryItOriginalCode);runTryIt();}}
function closeEditor(){document.getElementById('editorOverlay').classList.remove('open');}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
